<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✏️</text></svg>">
    <title>Food Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#14b8a6',
                        'bg-dark': '#0f1a1a',
                        'card-dark': '#1a2b2c',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overscroll-behavior: none;
        }

        .food-row {
            background: linear-gradient(135deg, #1a2b2c 0%, #0f1a1a 100%);
            border: 1px solid rgba(20, 184, 166, 0.1);
            transition: all 0.2s ease;
        }

        .food-row:active {
            transform: scale(0.98);
        }

        .food-row:hover {
            border-color: rgba(20, 184, 166, 0.3);
        }

        .form-input {
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #14b8a6;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.3);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.5);
        }

        #editView {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #editView.hidden {
            transform: translateX(100%);
        }

        #editView:not(.hidden) {
            transform: translateX(0);
        }

        #editView::-webkit-scrollbar {
            width: 4px;
        }

        #editView::-webkit-scrollbar-track {
            background: #0f1a1a;
        }

        #editView::-webkit-scrollbar-thumb {
            background: #3c5153;
            border-radius: 10px;
        }

        .allergen-chip {
            animation: chipIn 0.2s ease-out;
        }

        @keyframes chipIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
    <script src="data/loader.js"></script>
</head>

<body class="bg-bg-dark text-slate-100">
    <!-- List View -->
    <div class="min-h-screen flex flex-col" id="listView">
        <!-- Header -->
        <div class="sticky top-0 z-20 bg-bg-dark/95 backdrop-blur-md p-4 border-b border-primary/20">
            <div class="flex items-center justify-between gap-3 mb-3">
                <div class="flex items-center gap-3">
                    <a href="index.html" class="text-primary flex items-center">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <h1 class="text-lg font-bold tracking-widest uppercase text-slate-400">Food Builder</h1>
                </div>
                <div class="flex gap-2">
                    <button id="exportBtn"
                        class="flex items-center gap-1 bg-card-dark text-slate-300 px-3 py-2 rounded-lg text-sm font-medium border border-primary/20 hover:border-primary/40 transition-colors">
                        <span class="material-symbols-outlined text-sm">download</span> Export
                    </button>
                    <button id="addNewBtn"
                        class="flex items-center gap-1 bg-primary text-bg-dark px-3 py-2 rounded-lg text-sm font-bold hover:brightness-110 transition-all shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-sm">add</span> Add
                    </button>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Search dishes..."
                    class="search-input flex-1 bg-card-dark text-white px-4 py-2.5 rounded-lg border border-primary/20 text-sm placeholder-slate-500">
                <select id="categoryFilter"
                    class="form-input bg-card-dark text-white px-3 py-2.5 rounded-lg border border-primary/20 text-sm">
                    <option value="all">All Categories</option>
                </select>
            </div>
        </div>

        <!-- Food List -->
        <div class="flex-1 p-4">
            <div id="foodList" class="space-y-2"></div>
        </div>
    </div>

    <!-- Edit View (Full Screen) -->
    <div id="editView" class="fixed inset-0 z-50 bg-bg-dark overflow-y-auto hidden">
        <!-- Top Nav -->
        <nav
            class="sticky top-0 z-50 bg-bg-dark/80 backdrop-blur-md border-b border-primary/10 px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button id="editClose" class="p-1 hover:bg-primary/10 rounded-full transition-colors">
                    <span class="material-symbols-outlined text-slate-100">close</span>
                </button>
                <h1 id="editTitle" class="text-lg font-bold tracking-tight">Edit Dish</h1>
            </div>
            <div class="flex gap-2">
                <button id="editCancel"
                    class="px-4 py-2 text-sm font-bold text-primary hover:bg-primary/10 rounded-lg transition-colors">Cancel</button>
                <button id="editSave"
                    class="px-5 py-2 text-sm font-bold bg-primary text-bg-dark rounded-lg hover:brightness-110 transition-all shadow-lg shadow-primary/20">Save
                    Changes</button>
            </div>
        </nav>

        <main class="max-w-3xl mx-auto pb-24">
            <input type="hidden" id="editId">

            <!-- Hero Image Section -->
            <div class="relative group mt-4 px-4">
                <div id="heroPreview"
                    class="aspect-video w-full rounded-xl overflow-hidden bg-primary/5 border-2 border-dashed border-primary/20 flex flex-col items-center justify-center relative transition-all hover:border-primary/40">
                    <img id="heroImg" alt="Dish Preview"
                        class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:opacity-40 transition-opacity hidden">
                    <div class="relative z-10 flex flex-col items-center gap-2">
                        <span class="material-symbols-outlined text-4xl text-primary">photo_camera</span>
                        <span
                            class="text-sm font-bold bg-bg-dark/80 px-4 py-2 rounded-full border border-primary/20">Image
                            Preview</span>
                    </div>
                </div>
            </div>

            <form class="p-4 space-y-8" onsubmit="return false;">
                <!-- Section: General Information -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 border-l-4 border-primary pl-3">
                        <h2 class="text-xl font-bold">General Information</h2>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        <label class="block space-y-1.5">
                            <span class="text-sm font-semibold text-slate-400 ml-1">Dish Name *</span>
                            <input type="text" id="editName"
                                class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                placeholder="Enter dish name...">
                        </label>
                        <label class="block space-y-1.5">
                            <span class="text-sm font-semibold text-slate-400 ml-1">Subtitle</span>
                            <input type="text" id="editSubtitle"
                                class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                placeholder="Short description or catchphrase...">
                        </label>
                        <div class="grid grid-cols-2 gap-4">
                            <label class="block space-y-1.5">
                                <span class="text-sm font-semibold text-slate-400 ml-1">Category *</span>
                                <input type="text" id="editCategory"
                                    class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                    list="categorySuggestions" placeholder="e.g. Starters">
                                <datalist id="categorySuggestions"></datalist>
                            </label>
                            <label class="block space-y-1.5">
                                <span class="text-sm font-semibold text-slate-400 ml-1">Image Path</span>
                                <input type="text" id="editImage"
                                    class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white text-sm"
                                    placeholder="data/categories/menu_images/...">
                            </label>
                        </div>
                    </div>
                </section>

                <!-- Section: Culinary Details -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 border-l-4 border-primary pl-3">
                        <h2 class="text-xl font-bold">Culinary Details</h2>
                    </div>
                    <div class="space-y-4">
                        <label class="block space-y-1.5">
                            <span class="text-sm font-semibold text-slate-400 ml-1">Description</span>
                            <textarea id="editDescription"
                                class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                placeholder="Describe the flavors and preparation..." rows="4"></textarea>
                        </label>

                        <!-- Allergens -->
                        <div class="space-y-2">
                            <span class="text-sm font-semibold text-slate-400 ml-1">Allergens</span>
                            <div class="flex flex-wrap gap-2 p-3 bg-primary/5 border border-primary/20 rounded-lg min-h-[48px]"
                                id="allergenContainer">
                                <button type="button" id="addAllergenBtn"
                                    class="border border-primary/30 text-primary px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 hover:bg-primary/10 transition-colors">
                                    <span class="material-symbols-outlined text-sm">add</span> Add Allergen
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <label class="block space-y-1.5">
                                <span class="text-sm font-semibold text-slate-400 ml-1">Kitchen MEP</span>
                                <textarea id="editKitchenMep"
                                    class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                    placeholder="Kitchen prep details..." rows="3"></textarea>
                            </label>
                            <label class="block space-y-1.5">
                                <span class="text-sm font-semibold text-slate-400 ml-1">Service MEP</span>
                                <textarea id="editServiceMep"
                                    class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                    placeholder="Front of house requirements..." rows="3"></textarea>
                            </label>
                        </div>
                    </div>
                </section>

                <!-- Section: Wine Pairing -->
                <section class="p-5 rounded-xl bg-primary/5 border border-primary/10 space-y-4">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-primary">wine_bar</span>
                        <h2 class="text-lg font-bold">Wine Pairing</h2>
                    </div>
                    <div class="space-y-4">
                        <label class="block space-y-1.5">
                            <span class="text-sm font-semibold text-slate-400 ml-1">Wine Name</span>
                            <input type="text" id="editWineName"
                                class="form-input w-full bg-bg-dark/50 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                placeholder="e.g. Cloudy Bay Sauvignon Blanc">
                        </label>
                        <label class="block space-y-1.5">
                            <span class="text-sm font-semibold text-slate-400 ml-1">Tasting Notes</span>
                            <textarea id="editWineNotes"
                                class="form-input w-full bg-bg-dark/50 border border-primary/20 rounded-lg px-4 py-3 text-white"
                                placeholder="Describe the pairing..." rows="2"></textarea>
                        </label>
                    </div>
                </section>

                <!-- Section: Glossary -->
                <section class="space-y-4">
                    <div class="flex items-center justify-between border-l-4 border-primary pl-3">
                        <h2 class="text-xl font-bold">Glossary</h2>
                        <button type="button" id="addGlossaryBtn"
                            class="text-primary text-sm font-bold flex items-center gap-1 hover:underline">
                            <span class="material-symbols-outlined text-sm">add_circle</span> Add Term
                        </button>
                    </div>
                    <div id="glossaryContainer" class="space-y-3"></div>
                </section>

                <!-- Section: Additional Notes -->
                <section class="space-y-4">
                    <div class="flex items-center gap-2 border-l-4 border-primary pl-3">
                        <h2 class="text-xl font-bold">Additional Notes</h2>
                    </div>
                    <label class="block">
                        <textarea id="editNotes"
                            class="form-input w-full bg-primary/5 border border-primary/20 rounded-lg px-4 py-3 text-white"
                            placeholder="Internal notes for staff..." rows="3"></textarea>
                    </label>
                </section>
            </form>
        </main>

        <!-- Bottom Mobile Toolbar -->
        <div
            class="fixed bottom-0 left-0 right-0 p-4 bg-bg-dark/95 backdrop-blur-md border-t border-primary/10 flex gap-3 md:hidden z-50">
            <button id="editDeleteMobile"
                class="py-3 px-4 text-sm font-bold text-red-400 bg-red-500/10 rounded-lg border border-red-500/20 hidden">
                <span class="material-symbols-outlined text-sm align-middle">delete</span>
            </button>
            <div class="flex-1"></div>
            <button id="editCancelMobile"
                class="py-3 px-4 text-sm font-bold text-slate-400 bg-slate-800/20 rounded-lg">Discard</button>
            <button id="editSaveMobile"
                class="py-3 px-6 text-sm font-bold bg-primary text-bg-dark rounded-lg shadow-lg shadow-primary/20">Save
                Dish</button>
        </div>
    </div>

    <script>
        let allFoodItems = [];
        let filteredItems = [];
        let currentAllergens = [];

        const searchInput = document.getElementById('searchInput');
        const categoryFilter = document.getElementById('categoryFilter');
        const foodList = document.getElementById('foodList');
        const addNewBtn = document.getElementById('addNewBtn');
        const exportBtn = document.getElementById('exportBtn');
        const listView = document.getElementById('listView');
        const editView = document.getElementById('editView');

        // --- LIST VIEW ---

        function loadCategories() {
            const categories = Array.from(new Set(allFoodItems.map(c => c.category).filter(Boolean))).sort();
            categoryFilter.innerHTML = '<option value="all">All Categories</option>';
            categories.forEach(cat => {
                categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
            });

            const suggestions = document.getElementById('categorySuggestions');
            suggestions.innerHTML = categories.map(c => `<option value="${c}">`).join('');
        }

        function filterAndRender() {
            const query = searchInput.value.toLowerCase().trim();
            const category = categoryFilter.value;

            filteredItems = allFoodItems.filter(item => {
                const matchCategory = category === 'all' || item.category === category;
                const matchSearch = !query ||
                    item.name.toLowerCase().includes(query) ||
                    (item.subtitle && item.subtitle.toLowerCase().includes(query));
                return matchCategory && matchSearch;
            });
            renderList();
        }

        function renderList() {
            if (filteredItems.length === 0) {
                foodList.innerHTML = '<div class="text-center text-slate-500 py-12">No dishes found</div>';
                return;
            }

            foodList.innerHTML = filteredItems.map(item => `
                <div class="food-row rounded-xl p-3 cursor-pointer flex items-center gap-3" onclick="editItem('${item.id}')">
                    ${item.image ? `<img src="${item.image}" alt="${item.name}" class="w-12 h-12 rounded-lg object-cover flex-shrink-0" onerror="this.style.display='none'">` : ''}
                    <div class="flex-1 min-w-0">
                        <div class="font-semibold text-primary truncate">${item.name}</div>
                        ${item.subtitle ? `<div class="text-slate-400 text-sm truncate">${item.subtitle}</div>` : ''}
                    </div>
                    <span class="px-2 py-1 bg-primary/10 border border-primary/20 rounded-full text-xs text-primary flex-shrink-0">${item.category}</span>
                    <span class="material-symbols-outlined text-slate-600 text-lg">edit</span>
                </div>
            `).join('');
        }

        // --- EDIT VIEW ---

        function openEditor(item = null) {
            const isNew = !item;
            document.getElementById('editTitle').textContent = isNew ? 'Add New Dish' : 'Edit Dish';

            // Toggle delete buttons
            const delBtn = document.getElementById('editDeleteMobile');
            delBtn.classList.toggle('hidden', isNew);

            // Populate fields
            document.getElementById('editId').value = item?.id || '';
            document.getElementById('editName').value = item?.name || '';
            document.getElementById('editSubtitle').value = item?.subtitle || '';
            document.getElementById('editCategory').value = item?.category || '';
            document.getElementById('editDescription').value = item?.description || '';
            document.getElementById('editWineName').value = item?.wineSuggestion?.name || '';
            document.getElementById('editWineNotes').value = item?.wineSuggestion?.notes || '';
            document.getElementById('editNotes').value = item?.additionalNotes || '';
            document.getElementById('editKitchenMep').value = item?.kitchenMep || '';
            document.getElementById('editServiceMep').value = item?.serviceMep || '';
            document.getElementById('editImage').value = item?.image || '';

            // Hero image preview
            const heroImg = document.getElementById('heroImg');
            if (item?.image) {
                heroImg.src = item.image;
                heroImg.classList.remove('hidden');
            } else {
                heroImg.classList.add('hidden');
                heroImg.src = '';
            }

            // Allergens
            currentAllergens = Array.isArray(item?.allergens) ? [...item.allergens] : [];
            renderAllergens();

            // Glossary
            renderGlossary(item?.glossary);

            // Show editor
            listView.style.display = 'none';
            editView.classList.remove('hidden');
            editView.scrollTop = 0;
            history.pushState({ edit: true }, '', '#edit');
        }

        function closeEditor() {
            editView.classList.add('hidden');
            listView.style.display = '';
            if (location.hash === '#edit') history.back();
        }

        function editItem(id) {
            const item = allFoodItems.find(i => i.id === id);
            if (item) openEditor(item);
        }

        // --- ALLERGENS ---

        function renderAllergens() {
            const container = document.getElementById('allergenContainer');
            const addBtn = container.querySelector('#addAllergenBtn');

            // Remove all chips (keep add button)
            container.querySelectorAll('.allergen-chip').forEach(c => c.remove());

            // Add chips before the button
            currentAllergens.forEach((a, idx) => {
                const chip = document.createElement('span');
                chip.className = 'allergen-chip bg-primary text-bg-dark px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1';
                chip.innerHTML = `${a} <button type="button" class="material-symbols-outlined text-[14px] hover:text-red-600 transition-colors" onclick="removeAllergen(${idx})">close</button>`;
                container.insertBefore(chip, addBtn);
            });
        }

        function removeAllergen(idx) {
            currentAllergens.splice(idx, 1);
            renderAllergens();
        }

        document.getElementById('addAllergenBtn').onclick = () => {
            const name = prompt('Enter allergen name:');
            if (name && name.trim()) {
                currentAllergens.push(name.trim());
                renderAllergens();
            }
        };

        // --- GLOSSARY ---

        function renderGlossary(glossary) {
            const container = document.getElementById('glossaryContainer');
            container.innerHTML = '';

            let entries = [];
            if (Array.isArray(glossary)) {
                entries = glossary.map(entry => {
                    if (typeof entry === 'string') {
                        const idx = entry.indexOf(':');
                        if (idx > 0 && idx < 50) {
                            return { term: entry.substring(0, idx).trim(), definition: entry.substring(idx + 1).trim() };
                        }
                        return { term: '', definition: entry };
                    }
                    if (typeof entry === 'object' && entry.term) {
                        return { term: entry.term, definition: entry.definition || '' };
                    }
                    return null;
                }).filter(Boolean);
            } else if (typeof glossary === 'string' && glossary.trim()) {
                const idx = glossary.indexOf(':');
                if (idx > 0 && idx < 50) {
                    entries = [{ term: glossary.substring(0, idx).trim(), definition: glossary.substring(idx + 1).trim() }];
                } else {
                    entries = [{ term: '', definition: glossary }];
                }
            } else if (typeof glossary === 'object' && glossary && !Array.isArray(glossary)) {
                entries = Object.entries(glossary).map(([term, definition]) => ({ term, definition }));
            }

            entries.forEach((entry, idx) => addGlossaryRow(entry.term, entry.definition));
        }

        function addGlossaryRow(term = '', definition = '') {
            const container = document.getElementById('glossaryContainer');
            const row = document.createElement('div');
            row.className = 'glossary-row flex items-start gap-3 p-3 bg-primary/5 rounded-lg border border-primary/10';
            row.innerHTML = `
                <div class="flex-1 space-y-2">
                    <input type="text" class="glossary-term w-full bg-transparent border-b border-primary/20 text-sm font-bold focus:border-primary outline-none py-1 text-white" placeholder="Term name..." value="${term.replace(/"/g, '&quot;')}">
                    <textarea class="glossary-def w-full bg-transparent border-none text-xs text-slate-400 focus:ring-0 p-0 resize-none" rows="1" placeholder="Definition...">${definition}</textarea>
                </div>
                <button type="button" class="text-slate-500 hover:text-red-400 transition-colors mt-1" onclick="this.closest('.glossary-row').remove()">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            `;
            container.appendChild(row);
        }

        document.getElementById('addGlossaryBtn').onclick = () => addGlossaryRow();

        // --- IMAGE PREVIEW ---

        document.getElementById('editImage').addEventListener('input', (e) => {
            const heroImg = document.getElementById('heroImg');
            if (e.target.value.trim()) {
                heroImg.src = e.target.value.trim();
                heroImg.classList.remove('hidden');
                heroImg.onerror = () => heroImg.classList.add('hidden');
            } else {
                heroImg.classList.add('hidden');
            }
        });

        // --- SAVE ---

        function saveItem() {
            const id = document.getElementById('editId').value;
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value.trim();

            if (!name || !category) {
                alert('Name and Category are required');
                return;
            }

            const wineName = document.getElementById('editWineName').value.trim();
            const wineNotes = document.getElementById('editWineNotes').value.trim();

            // Collect glossary
            const glossaryRows = document.querySelectorAll('.glossary-row');
            const glossary = [];
            glossaryRows.forEach(row => {
                const term = row.querySelector('.glossary-term').value.trim();
                const def = row.querySelector('.glossary-def').value.trim();
                if (term || def) {
                    glossary.push(term ? `${term}: ${def}` : def);
                }
            });

            const image = document.getElementById('editImage').value.trim();

            const item = {
                id: id || (name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + Date.now()),
                name,
                subtitle: document.getElementById('editSubtitle').value.trim() || null,
                category,
                description: document.getElementById('editDescription').value.trim() || null,
                wineSuggestion: wineName ? { name: wineName, notes: wineNotes || null } : null,
                glossary: glossary.length > 0 ? glossary : [],
                additionalNotes: document.getElementById('editNotes').value.trim() || null,
                allergens: currentAllergens.length > 0 ? [...currentAllergens] : [],
                kitchenMep: document.getElementById('editKitchenMep').value.trim() || null,
                serviceMep: document.getElementById('editServiceMep').value.trim() || null,
                image: image || null
            };

            if (id) {
                const index = allFoodItems.findIndex(i => i.id === id);
                if (index !== -1) allFoodItems[index] = item;
            } else {
                allFoodItems.push(item);
            }

            saveToStorage();
            loadCategories();
            filterAndRender();
            closeEditor();
        }

        function deleteItem() {
            const id = document.getElementById('editId').value;
            if (!id || !confirm('Delete this dish?')) return;

            allFoodItems = allFoodItems.filter(i => i.id !== id);
            saveToStorage();
            loadCategories();
            filterAndRender();
            closeEditor();
        }

        // --- STORAGE ---

        function saveToStorage() {
            localStorage.setItem('foodItems', JSON.stringify(allFoodItems));
        }

        function loadFromStorage() {
            const stored = localStorage.getItem('foodItems');
            if (stored) {
                try { return JSON.parse(stored); } catch (e) { return null; }
            }
            return null;
        }

        function exportData() {
            const dataStr = 'window.registerFoodCategory(' + JSON.stringify(allFoodItems, null, 2) + ');';
            const blob = new Blob([dataStr], { type: 'application/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'scotts.js';
            a.click();
            URL.revokeObjectURL(url);
        }

        // --- EVENT LISTENERS ---

        addNewBtn.onclick = () => openEditor();
        exportBtn.onclick = exportData;
        document.getElementById('editClose').onclick = closeEditor;
        document.getElementById('editCancel').onclick = closeEditor;
        document.getElementById('editCancelMobile').onclick = closeEditor;
        document.getElementById('editSave').onclick = saveItem;
        document.getElementById('editSaveMobile').onclick = saveItem;
        document.getElementById('editDeleteMobile').onclick = deleteItem;
        searchInput.oninput = filterAndRender;
        categoryFilter.onchange = filterAndRender;

        // Browser back
        window.addEventListener('popstate', (e) => {
            if (!editView.classList.contains('hidden')) {
                editView.classList.add('hidden');
                listView.style.display = '';
            }
        });

        // --- INIT ---

        function initialize() {
            const stored = loadFromStorage();
            if (stored && stored.length > 0) {
                allFoodItems = stored;
            } else if (window.allFoodItems && window.allFoodItems.length > 0) {
                allFoodItems = JSON.parse(JSON.stringify(window.allFoodItems));
                saveToStorage();
            }
            loadCategories();
            filterAndRender();
        }

        window.addEventListener('foodLoaded', initialize);
        document.addEventListener('DOMContentLoaded', () => {
            if (window.foodDataReady) initialize();
            else {
                const stored = loadFromStorage();
                if (stored && stored.length > 0) {
                    allFoodItems = stored;
                    loadCategories();
                    filterAndRender();
                }
            }
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
