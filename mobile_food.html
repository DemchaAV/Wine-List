<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📱</text></svg>">
    <title>Food Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#14b8a6',
                        'bg-dark': '#0f1a1a',
                        'card-dark': '#1a2b2c',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overscroll-behavior: none;
        }

        /* Catalog styles */
        .food-card {
            background: linear-gradient(135deg, #1a2b2c 0%, #0f1a1a 100%);
            transition: all 0.2s ease;
            border: 1px solid rgba(20, 184, 166, 0.1);
        }

        .food-card:active {
            transform: scale(0.98);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
            color: white;
        }

        .search-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.5);
        }

        /* Detail view styles */
        #detailView {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #detailView.hidden {
            transform: translateX(100%);
        }

        #detailView:not(.hidden) {
            transform: translateX(0);
        }

        .hero-gradient {
            background: linear-gradient(to top, #0f1a1a 0%, rgba(15, 26, 26, 0.6) 40%, transparent 100%);
        }

        .hero-fallback {
            background: linear-gradient(135deg, #1a2b2c 0%, #0f1a1a 50%, #14b8a620 100%);
        }

        details summary::-webkit-details-marker {
            display: none;
        }

        details summary {
            list-style: none;
        }

        details[open] summary .expand-icon {
            transform: rotate(180deg);
        }

        .expand-icon {
            transition: transform 0.2s ease;
        }

        .wine-card {
            background: linear-gradient(135deg, rgba(26, 43, 44, 0.8) 0%, rgba(15, 26, 26, 0.9) 100%);
        }

        .section-fade-in {
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar */
        #detailView::-webkit-scrollbar {
            width: 0;
        }

        /* Lightbox */
        .lightbox {
            background: rgba(0, 0, 0, 0.95);
            opacity: 0;
            transition: opacity 0.3s ease;
            touch-action: pan-y pinch-zoom;
        }

        .lightbox.active {
            opacity: 1;
        }

        .lightbox img {
            transition: transform 0.3s ease;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .hero-clickable {
            cursor: zoom-in;
        }
    </style>
    <script src="data/loader.js"></script>
</head>

<body class="bg-bg-dark text-slate-100">
    <div class="min-h-screen flex flex-col" id="catalogView">
        <!-- Header -->
        <div class="sticky top-0 z-20 bg-bg-dark/95 backdrop-blur-md p-4 border-b border-primary/20">
            <div class="flex items-center gap-3 mb-3">
                <a href="index.html" class="text-primary flex items-center">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h1 class="text-lg font-bold tracking-widest uppercase text-slate-400 flex-1">Food Catalog</h1>
                <span id="itemCount" class="text-slate-500 text-sm">0 items</span>
            </div>

            <!-- Search -->
            <input type="text" id="searchInput" placeholder="Search dishes..."
                class="search-input w-full bg-card-dark text-white px-4 py-3 rounded-xl border border-primary/20 mb-3 placeholder-slate-500">

            <!-- Categories -->
            <div id="categoryList" class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4"></div>
        </div>

        <!-- Food List -->
        <div id="foodList" class="flex-1 p-4 space-y-3"></div>
    </div>

    <!-- Detail View (Full Screen) -->
    <div id="detailView" class="fixed inset-0 z-50 bg-bg-dark overflow-y-auto hidden">
        <!-- Sticky Nav -->
        <nav
            class="sticky top-0 z-50 bg-bg-dark/80 backdrop-blur-md border-b border-primary/20 px-4 py-3 flex items-center justify-between">
            <button id="detailBack" class="flex items-center text-primary p-1">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <h1 class="text-sm font-bold tracking-[0.2em] uppercase text-slate-400">Dish Intelligence</h1>
            <div class="w-8"></div>
        </nav>

        <!-- Detail Content -->
        <main id="detailContent" class="max-w-2xl mx-auto pb-12"></main>
    </div>

    <!-- Image Lightbox -->
    <div id="lightbox" class="lightbox fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <button id="lightboxClose"
            class="absolute top-4 right-4 z-10 bg-black/50 backdrop-blur-sm rounded-full p-2 text-white hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-2xl">close</span>
        </button>
        <div class="absolute top-4 left-4 z-10 bg-black/50 backdrop-blur-sm rounded-full px-3 py-1.5">
            <span id="lightboxTitle" class="text-white text-sm font-medium"></span>
        </div>
        <img id="lightboxImg" src="" alt="" class="rounded-lg">
    </div>

    <script>
        let allFoodItems = [];
        let filteredItems = [];
        let selectedCategory = 'all';

        const searchInput = document.getElementById('searchInput');
        const categoryList = document.getElementById('categoryList');
        const foodList = document.getElementById('foodList');
        const itemCount = document.getElementById('itemCount');
        const catalogView = document.getElementById('catalogView');
        const detailView = document.getElementById('detailView');
        const detailContent = document.getElementById('detailContent');
        const detailBack = document.getElementById('detailBack');

        function renderCategories() {
            const categories = ['all', ...Array.from(new Set(allFoodItems.map(c => c.category).filter(Boolean))).sort()];
            categoryList.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn flex-shrink-0 px-4 py-2 rounded-xl font-medium text-sm bg-card-dark text-slate-400 whitespace-nowrap border border-primary/10';
                btn.textContent = cat === 'all' ? 'All' : cat;
                if (cat === selectedCategory) btn.classList.add('active');
                btn.onclick = () => {
                    selectedCategory = cat;
                    categoryList.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterAndRender();
                };
                categoryList.appendChild(btn);
            });
        }

        function filterAndRender() {
            const query = searchInput.value.toLowerCase().trim();
            filteredItems = allFoodItems.filter(item => {
                const matchCategory = selectedCategory === 'all' || item.category === selectedCategory;
                const matchSearch = !query ||
                    item.name.toLowerCase().includes(query) ||
                    (item.subtitle && item.subtitle.toLowerCase().includes(query)) ||
                    (item.description && item.description.toLowerCase().includes(query));
                return matchCategory && matchSearch;
            });
            renderList();
        }

        function renderList() {
            itemCount.textContent = `${filteredItems.length} items`;
            if (filteredItems.length === 0) {
                foodList.innerHTML = '<div class="text-center text-slate-500 py-12">No dishes found</div>';
                return;
            }

            foodList.innerHTML = filteredItems.map(item => `
                <div class="food-card rounded-xl p-4 cursor-pointer" onclick="showDetail('${item.id}')">
                    <div class="flex items-center gap-3">
                        ${item.image ? `<img src="${item.image}" alt="${item.name}" class="w-14 h-14 rounded-lg object-cover flex-shrink-0" onerror="this.style.display='none'">` : ''}
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-primary truncate">${item.name}</h3>
                            ${item.subtitle ? `<p class="text-slate-400 text-sm truncate">${item.subtitle}</p>` : ''}
                            <div class="flex gap-2 mt-1.5 flex-wrap">
                                <span class="px-2 py-0.5 bg-primary/10 border border-primary/20 rounded-full text-xs text-primary">${item.category}</span>
                                ${item.allergens && item.allergens.length > 0 ? `<span class="px-2 py-0.5 bg-orange-500/10 border border-orange-500/20 rounded-full text-xs text-orange-400">${item.allergens.length} allergen${item.allergens.length > 1 ? 's' : ''}</span>` : ''}
                            </div>
                        </div>
                        <span class="material-symbols-outlined text-slate-600">chevron_right</span>
                    </div>
                </div>
            `).join('');
        }

        // Parse glossary into {term, definition} pairs
        function parseGlossary(glossary) {
            if (!glossary) return [];

            // String
            if (typeof glossary === 'string') {
                if (!glossary.trim()) return [];
                const colonIdx = glossary.indexOf(':');
                if (colonIdx > 0 && colonIdx < 40) {
                    return [{ term: glossary.substring(0, colonIdx).trim(), definition: glossary.substring(colonIdx + 1).trim() }];
                }
                return [{ term: 'Info', definition: glossary }];
            }

            // Dict {"term": "definition"}
            if (typeof glossary === 'object' && !Array.isArray(glossary)) {
                return Object.entries(glossary).map(([term, definition]) => ({ term, definition }));
            }

            // Array
            if (Array.isArray(glossary)) {
                return glossary.map(entry => {
                    if (typeof entry === 'string') {
                        const colonIdx = entry.indexOf(':');
                        if (colonIdx > 0 && colonIdx < 50) {
                            return { term: entry.substring(0, colonIdx).trim(), definition: entry.substring(colonIdx + 1).trim() };
                        }
                        return { term: 'Info', definition: entry };
                    }
                    if (typeof entry === 'object' && entry.term && entry.definition) {
                        return { term: entry.term, definition: entry.definition };
                    }
                    if (typeof entry === 'object') {
                        const [key, val] = Object.entries(entry)[0] || ['Info', ''];
                        return { term: key, definition: val };
                    }
                    return null;
                }).filter(Boolean);
            }

            return [];
        }

        function showDetail(id) {
            const item = allFoodItems.find(i => i.id === id);
            if (!item) return;

            const glossaryItems = parseGlossary(item.glossary);
            const hasAllergens = item.allergens && item.allergens.length > 0;
            const hasWine = item.wineSuggestion && item.wineSuggestion.name;
            const hasKitchenMep = item.kitchenMep && item.kitchenMep.trim();
            const hasServiceMep = item.serviceMep && item.serviceMep.trim();
            const hasMep = hasKitchenMep || hasServiceMep;

            detailContent.innerHTML = `
                <!-- Hero Section -->
                <div class="relative h-72 w-full overflow-hidden ${item.image ? 'hero-clickable' : 'hero-fallback'}" ${item.image ? `onclick="openLightbox('${item.image}', '${item.name.replace(/'/g, "\\'")}')"` : ''}>
                    ${item.image ? `
                    <div class="absolute inset-0 hero-gradient z-10 pointer-events-none"></div>
                    <img alt="${item.name}" class="w-full h-full object-cover"
                        src="${item.image}"
                        onerror="this.parentElement.classList.add('hero-fallback'); this.parentElement.classList.remove('hero-clickable'); this.parentElement.removeAttribute('onclick'); this.style.display='none';">
                    <div class="absolute top-3 right-3 z-20 bg-black/40 backdrop-blur-sm rounded-full p-1.5 pointer-events-none">
                        <span class="material-symbols-outlined text-white/70 text-lg">zoom_in</span>
                    </div>
                    ` : ''}
                    <div class="absolute bottom-0 left-0 p-6 z-20 w-full">
                        <div class="flex gap-2 mb-3 flex-wrap">
                            <span class="bg-primary/20 text-primary border border-primary/30 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">${item.category}</span>
                            ${hasAllergens ? item.allergens.map(a => `
                                <span class="bg-orange-500/20 text-orange-400 border border-orange-500/30 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider flex items-center gap-1">
                                    <span class="material-symbols-outlined text-sm">warning</span> ${a}
                                </span>
                            `).join('') : ''}
                        </div>
                        <h2 class="text-2xl font-bold leading-tight uppercase tracking-tight text-white">${item.name}</h2>
                        ${item.subtitle ? `<p class="text-primary font-medium text-base mt-1">${item.subtitle}</p>` : ''}
                    </div>
                </div>

                <!-- Description -->
                ${item.description ? `
                <section class="p-6 section-fade-in">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary">restaurant</span>
                        <h3 class="text-lg font-bold">Preparation & Description</h3>
                    </div>
                    <p class="leading-relaxed text-slate-300 text-sm">${item.description}</p>

                    ${item.additionalNotes ? `
                    <div class="mt-5 p-4 rounded-xl bg-primary/5 border border-primary/20">
                        <div class="flex items-start gap-3">
                            <span class="material-symbols-outlined text-primary mt-0.5 text-xl">info</span>
                            <div>
                                <p class="text-sm font-bold text-primary uppercase tracking-wide">Important Notes</p>
                                <p class="mt-1 text-sm text-slate-400">${Array.isArray(item.additionalNotes) ? item.additionalNotes.join(', ') : item.additionalNotes}</p>
                            </div>
                        </div>
                    </div>
                    ` : ''}
                </section>
                ` : `
                ${item.additionalNotes ? `
                <section class="p-6 section-fade-in">
                    <div class="p-4 rounded-xl bg-primary/5 border border-primary/20">
                        <div class="flex items-start gap-3">
                            <span class="material-symbols-outlined text-primary mt-0.5 text-xl">info</span>
                            <div>
                                <p class="text-sm font-bold text-primary uppercase tracking-wide">Important Notes</p>
                                <p class="mt-1 text-sm text-slate-400">${Array.isArray(item.additionalNotes) ? item.additionalNotes.join(', ') : item.additionalNotes}</p>
                            </div>
                        </div>
                    </div>
                </section>
                ` : ''}
                `}

                <!-- Wine Pairing -->
                ${hasWine ? `
                <section class="px-6 py-4 section-fade-in" style="animation-delay: 0.1s">
                    <div class="wine-card border border-slate-700/50 rounded-2xl p-5 overflow-hidden relative">
                        <div class="absolute top-0 right-0 p-4 opacity-[0.07]">
                            <span class="material-symbols-outlined" style="font-size: 5rem">wine_bar</span>
                        </div>
                        <div class="relative z-10">
                            <h3 class="text-primary text-xs font-bold uppercase tracking-[0.2em] mb-2">Sommelier Suggestion</h3>
                            <h4 class="text-xl font-bold mb-3 text-white">${item.wineSuggestion.name}</h4>
                            ${item.wineSuggestion.notes ? `
                            <div class="space-y-3">
                                <div class="flex gap-2 items-start">
                                    <span class="material-symbols-outlined text-primary text-lg mt-0.5">temp_preferences_custom</span>
                                    <p class="text-sm italic text-slate-300">"${item.wineSuggestion.notes}"</p>
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                </section>
                ` : ''}

                <!-- MEP Section -->
                ${hasMep ? `
                <section class="p-6 section-fade-in" style="animation-delay: 0.15s">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary">inventory</span>
                        <h3 class="text-lg font-bold">Mise en Place</h3>
                    </div>
                    <div class="grid ${hasKitchenMep && hasServiceMep ? 'grid-cols-2' : 'grid-cols-1'} gap-4">
                        ${hasKitchenMep ? `
                        <div class="bg-card-dark p-4 rounded-xl border border-primary/10">
                            <p class="text-xs font-bold uppercase text-primary mb-2 tracking-wider">Kitchen</p>
                            <p class="text-sm text-slate-300 leading-relaxed">${item.kitchenMep}</p>
                        </div>
                        ` : ''}
                        ${hasServiceMep ? `
                        <div class="bg-card-dark p-4 rounded-xl border border-primary/10">
                            <p class="text-xs font-bold uppercase text-primary mb-2 tracking-wider">Service</p>
                            <p class="text-sm text-slate-300 leading-relaxed">${item.serviceMep}</p>
                        </div>
                        ` : ''}
                    </div>
                </section>
                ` : ''}

                <!-- Glossary Section -->
                ${glossaryItems.length > 0 ? `
                <section class="p-6 border-t border-slate-800 section-fade-in" style="animation-delay: 0.2s">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary">book_2</span>
                        <h3 class="text-lg font-bold">Culinary Glossary</h3>
                    </div>
                    <div class="space-y-1">
                        ${glossaryItems.map((g, idx) => `
                        <details class="group border-b border-slate-800 pb-3 pt-2" ${idx === 0 ? 'open' : ''}>
                            <summary class="flex justify-between items-center cursor-pointer">
                                <span class="font-semibold group-open:text-primary text-slate-200 transition-colors">${g.term}</span>
                                <span class="material-symbols-outlined expand-icon text-slate-500 group-open:text-primary transition-colors">expand_more</span>
                            </summary>
                            <p class="mt-2 text-sm text-slate-400 leading-relaxed">${g.definition}</p>
                        </details>
                        `).join('')}
                    </div>
                </section>
                ` : ''}
            `;

            catalogView.style.display = 'none';
            detailView.classList.remove('hidden');
            detailView.scrollTop = 0;
            document.body.style.overflow = '';
            history.pushState({ detail: id }, '', `#${id}`);
        }

        function hideDetail() {
            detailView.classList.add('hidden');
            catalogView.style.display = '';
            if (location.hash) history.back();
        }

        detailBack.onclick = hideDetail;

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightboxImg');
        const lightboxTitle = document.getElementById('lightboxTitle');
        const lightboxClose = document.getElementById('lightboxClose');

        function openLightbox(src, title) {
            lightboxImg.src = src;
            lightboxImg.alt = title;
            lightboxTitle.textContent = title;
            lightbox.classList.remove('hidden');
            requestAnimationFrame(() => lightbox.classList.add('active'));
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => {
                lightbox.classList.add('hidden');
                lightboxImg.src = '';
                document.body.style.overflow = '';
            }, 300);
        }

        lightboxClose.onclick = closeLightbox;
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) closeLightbox(); });

        // Handle browser back button
        window.addEventListener('popstate', (e) => {
            if (!lightbox.classList.contains('hidden')) {
                closeLightbox();
                return;
            }
            if (!detailView.classList.contains('hidden')) {
                detailView.classList.add('hidden');
                catalogView.style.display = '';
            }
        });

        searchInput.oninput = filterAndRender;

        function initialize() {
            if (window.allFoodItems && window.allFoodItems.length > 0) {
                allFoodItems = window.allFoodItems;
                renderCategories();
                filterAndRender();

                // If URL has a hash, open that dish
                if (location.hash) {
                    const id = location.hash.substring(1);
                    showDetail(id);
                }
            }
        }

        window.addEventListener('foodLoaded', initialize);
        document.addEventListener('DOMContentLoaded', () => {
            if (window.foodDataReady) initialize();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
