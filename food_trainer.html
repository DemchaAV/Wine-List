<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <title>Food Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#14b8a6',
                        'bg-dark': '#0f1a1a',
                        'card-dark': '#1a2b2c',
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overscroll-behavior: none;
        }

        .trainer-container {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .screen {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .screen.active {
            display: flex;
        }

        .progress-container {
            background: rgba(20, 184, 166, 0.15);
            border-radius: 9999px;
            overflow: hidden;
            height: 6px;
        }

        .progress-bar {
            background: linear-gradient(90deg, #14b8a6 0%, #06b6d4 100%);
            transition: width 0.4s ease-out;
            height: 100%;
            border-radius: 9999px;
        }

        .question-card {
            background: linear-gradient(135deg, #1a2b2c 0%, #0f1a1a 100%);
            border: 1px solid rgba(20, 184, 166, 0.15);
            border-radius: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .answer-reveal {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
            transition: all 0.2s;
            min-height: 56px;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.2s;
            min-height: 56px;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.2s;
            min-height: 56px;
        }

        .filter-btn {
            transition: all 0.2s;
            min-height: 44px;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
            color: white;
            border-color: transparent !important;
            box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3);
        }

        .swipe-left {
            transform: translateX(-120%) rotate(-8deg);
            opacity: 0.3;
            transition: all 0.3s ease-out;
        }

        .swipe-right {
            transform: translateX(120%) rotate(8deg);
            opacity: 0.3;
            transition: all 0.3s ease-out;
        }

        @keyframes pulse-ring {
            0% {
                box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(20, 184, 166, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(20, 184, 166, 0);
            }
        }

        .info-btn {
            animation: pulse-ring 2s ease-out infinite;
        }

        @keyframes celebrate {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .celebrate-icon {
            animation: celebrate 0.6s ease-in-out infinite;
        }

        .modal-backdrop {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }

        /* Menu version toggle */
        .menu-toggle {
            display: flex;
            background: #1a2b2c;
            border-radius: 12px;
            border: 1px solid rgba(20, 184, 166, 0.15);
            overflow: hidden;
        }

        .menu-toggle button {
            flex: 1;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
            background: transparent;
            color: #64748b;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .menu-toggle button.active {
            background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
            color: white;
            border-radius: 10px;
        }
    </style>
    <script src="data/loader.js"></script>
</head>

<body class="bg-bg-dark text-slate-100">
    <div class="trainer-container">
        <!-- SETUP SCREEN -->
        <div id="setupScreen" class="screen active p-4">
            <div class="text-center py-4">
                <a href="index.html" class="inline-flex items-center gap-1 text-primary hover:text-primary/80 mb-3">
                    <span class="material-symbols-outlined text-xl">arrow_back</span>
                    <span class="text-sm font-medium">Home</span>
                </a>
                <h1 class="text-3xl font-bold text-primary mb-1 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-3xl">school</span>
                    Food Trainer
                </h1>
                <p class="text-slate-400 text-sm">Scott's Richmond</p>
            </div>

            <div class="flex-1 flex flex-col justify-center">
                <!-- Menu Version -->
                <div class="mb-6">
                    <h2 class="text-lg font-semibold text-center mb-3 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-primary text-lg">menu_book</span>
                        Menu Version
                    </h2>
                    <div class="menu-toggle mx-auto max-w-xs" id="menuVersionToggle">
                        <button class="active" onclick="setTrainerMenuVersion('current')" data-version="current">Current
                            Menu</button>
                        <button onclick="setTrainerMenuVersion('previous')" data-version="previous">Previous
                            Menu</button>
                    </div>
                </div>

                <div class="mb-6">
                    <h2 class="text-lg font-semibold text-center mb-3 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-primary text-lg">category</span>
                        Select Category
                    </h2>
                    <div id="categorySelect" class="flex flex-wrap justify-center gap-2"></div>
                </div>

                <div class="mb-8">
                    <h2 class="text-lg font-semibold text-center mb-3 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-primary text-lg">quiz</span>
                        Question Type
                    </h2>
                    <div id="typeSelect" class="flex flex-wrap justify-center gap-2">
                        <button data-type="mix"
                            class="filter-btn active bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">shuffle</span> Mix
                        </button>
                        <button data-type="description"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">description</span> Description
                        </button>
                        <button data-type="wine"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">wine_bar</span> Wine
                        </button>
                        <button data-type="glossary"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">book_2</span> Glossary
                        </button>
                        <button data-type="allergens"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">warning</span> Allergens
                        </button>
                        <button data-type="kitchenMep"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">skillet</span> Kitchen MEP
                        </button>
                        <button data-type="serviceMep"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">room_service</span> Service MEP
                        </button>
                        <button data-type="reverse"
                            class="filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">lightbulb</span> Name It

                    </div>

                    <!-- NEW Only filter -->
                    <div class="mt-4 flex justify-center">
                        <button id="trainerNewFilter" onclick="toggleTrainerNewFilter()"
                            class="filter-btn bg-card-dark text-slate-300 px-5 py-2 rounded-xl font-medium border border-primary/20 flex items-center gap-1.5">
                            <span class="material-symbols-outlined text-sm">new_releases</span> ✨ NEW Only
                        </button>
                    </div>
                </div>
            </div>

            <div class="pb-6">
                <div id="sessionInfo" class="text-center text-slate-400 text-sm mb-3"></div>
                <button id="startSessionBtn"
                    class="btn-primary w-full text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">rocket_launch</span> Start Training
                </button>
            </div>
        </div>

        <!-- TRAINING SCREEN -->
        <div id="trainingScreen" class="screen p-4">
            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <button id="exitSessionBtn" class="text-slate-400 hover:text-white text-sm flex items-center gap-1">
                        <span class="material-symbols-outlined text-sm">arrow_back</span> Exit
                    </button>
                    <div id="progressText" class="text-sm font-medium text-slate-300">0/0</div>
                    <div class="flex gap-2">
                        <span
                            class="bg-green-900/50 text-green-400 px-3 py-1 rounded-full text-sm font-semibold flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">check</span>
                            <span id="statCorrect">0</span>
                        </span>
                        <span
                            class="bg-red-900/50 text-red-400 px-3 py-1 rounded-full text-sm font-semibold flex items-center gap-1">
                            <span class="material-symbols-outlined text-sm">close</span>
                            <span id="statWrong">0</span>
                        </span>
                    </div>
                </div>
                <div class="progress-container">
                    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                </div>
            </div>

            <div class="flex-1 flex items-center justify-center">
                <div id="trainerCard" class="question-card w-full p-6">
                    <div class="flex items-start justify-between gap-3 mb-4">
                        <div id="questionBlock" class="text-xl font-semibold flex-1"></div>
                        <button id="showInfoBtn"
                            class="info-btn flex-shrink-0 bg-gradient-to-br from-primary to-teal-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
                            <span class="material-symbols-outlined">info</span>
                        </button>
                    </div>

                    <button id="showAnswerBtn"
                        class="btn-primary w-full text-white py-4 rounded-xl font-semibold shadow-lg shadow-primary/20 mb-4 flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">visibility</span> Show Answer
                    </button>

                    <div id="answerBlock" class="answer-reveal max-h-0 mb-4 text-center font-medium text-lg"></div>

                    <div id="selfCheckBlock" class="flex gap-3 hidden">
                        <button id="wrongBtn"
                            class="btn-danger flex-1 text-white py-4 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">close</span> Wrong
                        </button>
                        <button id="correctBtn"
                            class="btn-success flex-1 text-white py-4 rounded-xl font-semibold shadow-lg flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined">check</span> Correct
                        </button>
                    </div>
                </div>
            </div>

            <div class="text-center text-slate-600 text-xs pb-2 flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-sm">swipe_left</span>
                Swipe left for Correct • Swipe right for Wrong
                <span class="material-symbols-outlined text-sm">swipe_right</span>
            </div>
        </div>

        <!-- COMPLETE SCREEN -->
        <div id="completeScreen" class="screen p-4">
            <div class="flex-1 flex flex-col items-center justify-center text-center">
                <div class="celebrate-icon mb-4">
                    <div
                        class="w-20 h-20 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-4xl">emoji_events</span>
                    </div>
                </div>
                <h2 class="text-3xl font-bold text-primary mb-2">Session Complete!</h2>
                <p id="completeCategory" class="text-slate-400 mb-6"></p>

                <div class="bg-card-dark border border-primary/10 rounded-2xl p-6 w-full max-w-xs mb-6">
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div>
                            <div class="text-4xl font-bold text-green-400" id="finalCorrect">0</div>
                            <div class="text-sm text-slate-400">Correct</div>
                        </div>
                        <div>
                            <div class="text-4xl font-bold text-red-400" id="finalWrong">0</div>
                            <div class="text-sm text-slate-400">Mistakes</div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-primary/10">
                        <div class="text-2xl font-bold text-primary" id="finalAccuracy">0%</div>
                        <div class="text-sm text-slate-400">Accuracy</div>

                </div>
            </div>

            <div class="pb-6 space-y-3">
                <button id="restartSessionBtn"
                    class="btn-primary w-full text-white py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">replay</span> Train Again
                </button>
                <button id="changeCategoryBtn"
                    class="w-full text-slate-400 py-3 rounded-xl font-medium flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">tune</span> Change Category

    <!-- INFO MODAL -->
    <div id="foodInfoModal" class="fixed inset-0 z-50 flex items-center justify-center modal-backdrop hidden">
        <div
            class="bg-card-dark border border-primary/10 rounded-2xl shadow-xl max-w-md w-full mx-4 p-6 relative max-h-[80vh] overflow-y-auto">
            <button id="closeInfoBtn"
                class="absolute top-3 right-3 text-slate-400 hover:text-red-500 p-1 transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div id="foodInfoContent"></div>
        </div>
    </div>

    <script>
        let allFoodItems = [];
        let sessionQueue = [];
        let sessionCompleted = [];
        let sessionTotal = 0;
        let statCorrect = 0;
        let statWrong = 0;
        let currentQuestion = null;
        let selectedCategory = 'all';
        let selectedType = 'mix';
        let trainerMenuVersion = 'current';
        let trainerNewOnly = false;

        const setupScreen = document.getElementById('setupScreen');
        const trainingScreen = document.getElementById('trainingScreen');
        const completeScreen = document.getElementById('completeScreen');
        const categorySelect = document.getElementById('categorySelect');
        const typeSelect = document.getElementById('typeSelect');
        const sessionInfo = document.getElementById('sessionInfo');
        const startSessionBtn = document.getElementById('startSessionBtn');
        const progressText = document.getElementById('progressText');
        const progressBar = document.getElementById('progressBar');
        const statCorrectEl = document.getElementById('statCorrect');
        const statWrongEl = document.getElementById('statWrong');
        const exitSessionBtn = document.getElementById('exitSessionBtn');
        const trainerCard = document.getElementById('trainerCard');
        const questionBlock = document.getElementById('questionBlock');
        const answerBlock = document.getElementById('answerBlock');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const selfCheckBlock = document.getElementById('selfCheckBlock');
        const correctBtn = document.getElementById('correctBtn');
        const wrongBtn = document.getElementById('wrongBtn');
        const showInfoBtn = document.getElementById('showInfoBtn');
        const foodInfoModal = document.getElementById('foodInfoModal');
        const closeInfoBtn = document.getElementById('closeInfoBtn');
        const foodInfoContent = document.getElementById('foodInfoContent');
        const restartSessionBtn = document.getElementById('restartSessionBtn');
        const changeCategoryBtn = document.getElementById('changeCategoryBtn');

        function showScreen(screenId) {
            [setupScreen, trainingScreen, completeScreen].forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function renderCategoryButtons() {
            const categories = ['all', ...Array.from(new Set(allFoodItems.map(c => c.category).filter(Boolean))).sort()];
            categorySelect.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn bg-card-dark text-slate-300 px-4 py-2 rounded-xl font-medium border border-primary/20';
                btn.textContent = cat === 'all' ? 'All' : cat;
                btn.dataset.category = cat;
                if (cat === selectedCategory) btn.classList.add('active');
                btn.onclick = () => {
                    categorySelect.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedCategory = cat;
                    updateSessionInfo();
                };
                categorySelect.appendChild(btn);
            });
        }

        function setupTypeButtons() {
            typeSelect.querySelectorAll('.filter-btn').forEach(btn => {
                btn.onclick = () => {
                    typeSelect.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedType = btn.dataset.type;
                };
            });
        }

        function updateSessionInfo() {
            const count = getFilteredItems().length;
            sessionInfo.textContent = `${count} dishes in this session`;
        }

        function getFilteredItems() {
            let items = allFoodItems;
            if (selectedCategory !== 'all') {
                items = items.filter(c => c.category && c.category.toLowerCase() === selectedCategory.toLowerCase());
            }
            if (trainerNewOnly) {
                items = items.filter(c => c.tags && c.tags.includes('new'));
            }
            return items;
        }

        function startSession() {
            const items = getFilteredItems();
            if (items.length === 0) {
                alert('No dishes in this category');
                return;
            }
            sessionQueue = shuffleArray([...items]);
            sessionCompleted = [];
            sessionTotal = sessionQueue.length;
            statCorrect = 0;
            statWrong = 0;
            updateStats();
            showScreen('trainingScreen');
            nextQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function endSession() {
            document.getElementById('completeCategory').textContent =
                selectedCategory === 'all' ? 'All Categories' : selectedCategory;
            document.getElementById('finalCorrect').textContent = statCorrect;
            document.getElementById('finalWrong').textContent = statWrong;
            const accuracy = sessionTotal > 0 ? Math.round((statCorrect / sessionTotal) * 100) : 0;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            showScreen('completeScreen');
        }

        function nextQuestion() {
            answerBlock.innerHTML = '';
            answerBlock.style.maxHeight = '0';
            selfCheckBlock.classList.add('hidden');
            showAnswerBtn.disabled = false;
            showAnswerBtn.classList.remove('hidden');

            if (sessionQueue.length === 0) {
                endSession();
                return;
            }

            const item = sessionQueue.shift();
            let type = selectedType;
            if (type === 'mix') {
                const types = ['description', 'wine', 'glossary', 'allergens', 'kitchenMep', 'serviceMep'];
                type = types[Math.floor(Math.random() * types.length)];
            }

            currentQuestion = { item, type };
            const name = `<span class="text-primary font-bold">${item.name}</span>`;
            const subtitle = item.subtitle ? `<br><span class="text-sm text-slate-400">${item.subtitle}</span>` : '';

            if (type === 'description') {
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-primary align-middle mr-1">description</span> What is the description of ${name}?${subtitle}`;
            } else if (type === 'wine') {
                if (!item.wineSuggestion) {
                    sessionQueue.push(item);
                    nextQuestion();
                    return;
                }
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-primary align-middle mr-1">wine_bar</span> What wine pairs with ${name}?${subtitle}`;
            } else if (type === 'glossary') {
                if (!item.glossary) {
                    sessionQueue.push(item);
                    nextQuestion();
                    return;
                }
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-primary align-middle mr-1">book_2</span> What's in the glossary for ${name}?${subtitle}`;
            } else if (type === 'allergens') {
                if (!item.allergens || item.allergens.length === 0) {
                    sessionQueue.push(item);
                    nextQuestion();
                    return;
                }
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-orange-400 align-middle mr-1">warning</span> What allergens are in ${name}?${subtitle}`;
            } else if (type === 'kitchenMep') {
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-primary align-middle mr-1">skillet</span> What is the Kitchen MEP for ${name}?${subtitle}`;
            } else if (type === 'serviceMep') {
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-primary align-middle mr-1">room_service</span> What is the Service MEP for ${name}?${subtitle}`;
            } else if (type === 'reverse') {
                if (!item.description) {
                    sessionQueue.push(item);
                    nextQuestion();
                    return;
                }
                const desc = item.description.substring(0, 150) + (item.description.length > 150 ? '...' : '');
                questionBlock.innerHTML = `<span class="material-symbols-outlined text-primary align-middle mr-1">lightbulb</span> Name this dish:<br><span class="text-base text-slate-300 mt-2 block">"${desc}"</span>`;
            }

            updateProgress();
        }

        function formatGlossary(glossary) {
            if (Array.isArray(glossary)) {
                return glossary.map(entry => {
                    if (typeof entry === 'string') {
                        const idx = entry.indexOf(':');
                        if (idx > 0 && idx < 50) {
                            return `<div class="mb-2"><span class="font-bold text-primary">${entry.substring(0, idx).trim()}</span>: ${entry.substring(idx + 1).trim()}</div>`;
                        }
                        return `<div class="mb-1">${entry}</div>`;
                    }
                    if (typeof entry === 'object' && entry.term) {
                        return `<div class="mb-2"><span class="font-bold text-primary">${entry.term}</span>: ${entry.definition || ''}</div>`;
                    }
                    return '';
                }).join('');
            } else if (typeof glossary === 'string') {
                return glossary;
            } else if (typeof glossary === 'object' && glossary) {
                return Object.entries(glossary).map(([term, def]) =>
                    `<div class="mb-2"><span class="font-bold text-primary">${term}</span>: ${def}</div>`
                ).join('');
            }
            return 'No glossary';
        }

        function formatAllergens(allergens) {
            if (Array.isArray(allergens)) {
                return allergens.map(a =>
                    `<span class="inline-block bg-orange-500/20 text-orange-400 border border-orange-500/30 px-3 py-1 rounded-full text-sm font-bold mr-1 mb-1">${a}</span>`
                ).join('');
            }
            return allergens || 'None listed';
        }

        function showAnswer() {
            if (!currentQuestion) return;
            let answerHtml = '';
            const { item, type } = currentQuestion;

            if (type === 'description') {
                answerHtml = `<div class="text-left text-base">${item.description || 'No description'}</div>`;
            } else if (type === 'wine') {
                const wine = item.wineSuggestion;
                answerHtml = `<div class="text-primary text-xl font-bold mb-2 flex items-center gap-2 justify-center">
                    <span class="material-symbols-outlined">wine_bar</span> ${wine?.name || 'N/A'}</div>
                    <div class="text-slate-400 text-sm italic">${wine?.notes || ''}</div>`;
            } else if (type === 'glossary') {
                answerHtml = `<div class="text-left text-base">${formatGlossary(item.glossary)}</div>`;
            } else if (type === 'allergens') {
                answerHtml = `<div class="flex flex-wrap justify-center gap-1">${formatAllergens(item.allergens)}</div>`;
            } else if (type === 'kitchenMep') {
                answerHtml = `<div class="text-left flex items-start gap-2"><span class="material-symbols-outlined text-primary mt-0.5">skillet</span> ${item.kitchenMep || 'N/A'}</div>`;
            } else if (type === 'serviceMep') {
                answerHtml = `<div class="text-left flex items-start gap-2"><span class="material-symbols-outlined text-primary mt-0.5">room_service</span> ${item.serviceMep || 'N/A'}</div>`;
            } else if (type === 'reverse') {
                answerHtml = `<span class="text-2xl font-bold text-primary flex items-center gap-2 justify-center">
                    <span class="material-symbols-outlined">restaurant</span> ${item.name}</span>`;
            }

            answerBlock.innerHTML = answerHtml;
            answerBlock.style.maxHeight = '400px';
            selfCheckBlock.classList.remove('hidden');
            showAnswerBtn.classList.add('hidden');
        }

        function handleCorrect() {
            statCorrect++;
            sessionCompleted.push(currentQuestion.item);
            updateStats();
            animateCard('left', nextQuestion);
        }

        function handleWrong() {
            statWrong++;
            sessionQueue.push(currentQuestion.item);
            updateStats();
            animateCard('right', nextQuestion);
        }

        function animateCard(direction, callback) {
            trainerCard.classList.add(direction === 'left' ? 'swipe-left' : 'swipe-right');
            setTimeout(() => {
                trainerCard.classList.remove('swipe-left', 'swipe-right');
                callback();
            }, 250);
        }

        function updateStats() {
            statCorrectEl.textContent = statCorrect;
            statWrongEl.textContent = statWrong;
        }

        function updateProgress() {
            const completed = sessionCompleted.length;
            const percent = sessionTotal > 0 ? Math.round((completed / sessionTotal) * 100) : 0;
            progressText.textContent = `${completed}/${sessionTotal}`;
            progressBar.style.width = percent + '%';
        }

        function showFoodInfo() {
            if (!currentQuestion || !currentQuestion.item) return;
            const c = currentQuestion.item;
            foodInfoContent.innerHTML = `
                <div class="flex items-start gap-3 mb-4">
                    ${c.image ? `<img src="${c.image}" alt="${c.name}" class="w-16 h-16 rounded-lg object-cover flex-shrink-0" onerror="this.style.display='none'">` : ''}
                    <div>
                        <h2 class="text-2xl font-bold text-primary mb-1">${c.name}</h2>
                        ${c.subtitle ? `<p class="text-slate-400 text-sm">${c.subtitle}</p>` : ''}
                    </div>
                </div>
                <div class="space-y-3 text-sm">
                    <div class="flex items-center gap-2"><span class="material-symbols-outlined text-primary text-sm">category</span> <span class="font-semibold text-slate-400">Category:</span> ${c.category || 'N/A'}</div>
                    ${c.description ? `<div><span class="material-symbols-outlined text-primary text-sm align-middle">description</span> <span class="font-semibold text-slate-400">Description:</span><br><span class="text-slate-300">${c.description}</span></div>` : ''}
                    ${c.wineSuggestion ? `<div><span class="material-symbols-outlined text-primary text-sm align-middle">wine_bar</span> <span class="font-semibold text-slate-400">Wine:</span> ${c.wineSuggestion.name}${c.wineSuggestion.notes ? `<br><span class="text-slate-400 text-xs italic">${c.wineSuggestion.notes}</span>` : ''}</div>` : ''}
                    ${c.allergens && c.allergens.length > 0 ? `<div><span class="material-symbols-outlined text-orange-400 text-sm align-middle">warning</span> <span class="font-semibold text-orange-400">Allergens:</span> ${formatAllergens(c.allergens)}</div>` : ''}
                    ${c.kitchenMep ? `<div><span class="material-symbols-outlined text-primary text-sm align-middle">skillet</span> <span class="font-semibold text-slate-400">Kitchen MEP:</span><br><span class="text-slate-300">${c.kitchenMep}</span></div>` : ''}
                    ${c.serviceMep ? `<div><span class="material-symbols-outlined text-primary text-sm align-middle">room_service</span> <span class="font-semibold text-slate-400">Service MEP:</span><br><span class="text-slate-300">${c.serviceMep}</span></div>` : ''}
                    ${c.glossary ? `<div><span class="material-symbols-outlined text-primary text-sm align-middle">book_2</span> <span class="font-semibold text-slate-400">Glossary:</span><br>${formatGlossary(c.glossary)}</div>` : ''}
                </div>
            `;
            foodInfoModal.classList.remove('hidden');
        }

        function closeModal() {
            foodInfoModal.classList.add('hidden');
        }

        // Swipe support
        let swipeStartX = null;
        trainerCard.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) swipeStartX = e.touches[0].clientX;
        });
        trainerCard.addEventListener('touchmove', (e) => {
            if (swipeStartX === null) return;
            const deltaX = e.touches[0].clientX - swipeStartX;
            trainerCard.style.transform = `translateX(${deltaX}px) rotate(${deltaX * 0.05}deg)`;
        });
        trainerCard.addEventListener('touchend', (e) => {
            if (swipeStartX === null) return;
            const deltaX = e.changedTouches[0].clientX - swipeStartX;
            swipeStartX = null;
            if (deltaX < -80) {
                trainerCard.style.transform = '';
                trainerCard.style.transition = '';
                handleCorrect();
            } else if (deltaX > 80) {
                trainerCard.style.transform = '';
                trainerCard.style.transition = '';
                handleWrong();
            } else {
                trainerCard.style.transition = 'transform 0.3s';
                trainerCard.style.transform = '';
                setTimeout(() => trainerCard.style.transition = '', 300);
            }
        });

        // Event listeners
        startSessionBtn.onclick = startSession;
        showAnswerBtn.onclick = showAnswer;
        correctBtn.onclick = handleCorrect;
        wrongBtn.onclick = handleWrong;
        showInfoBtn.onclick = showFoodInfo;
        closeInfoBtn.onclick = closeModal;
        foodInfoModal.onclick = (e) => { if (e.target === foodInfoModal) closeModal(); };
        exitSessionBtn.onclick = () => { if (confirm('Exit training session?')) showScreen('setupScreen'); };
        restartSessionBtn.onclick = startSession;
        changeCategoryBtn.onclick = () => showScreen('setupScreen');

        // Menu version toggle
        function setTrainerMenuVersion(version) {
            trainerMenuVersion = version;
            document.querySelectorAll('#menuVersionToggle button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.version === version);
            });
            if (version === 'current') {
                allFoodItems = window.allFoodItems || [];
            } else {
                allFoodItems = window.previousFoodItems || [];
            }
            renderCategoryButtons();
            updateSessionInfo();
        }

        function toggleTrainerNewFilter() {
            trainerNewOnly = !trainerNewOnly;
            const btn = document.getElementById('trainerNewFilter');
            if (trainerNewOnly) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            updateSessionInfo();
        }

        // Initialization
        function initializeTrainer() {
            if (window.allFoodItems && window.allFoodItems.length > 0) {
                allFoodItems = window.allFoodItems;
                renderCategoryButtons();
                setupTypeButtons();
                updateSessionInfo();
            } else {
                sessionInfo.textContent = 'Loading data...';
            }
        }

        window.addEventListener('foodLoaded', initializeTrainer);
        document.addEventListener('DOMContentLoaded', () => {
            if (window.foodDataReady) initializeTrainer();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
        }
    </script>
</body>

</html>
